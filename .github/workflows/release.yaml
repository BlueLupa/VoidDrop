name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, e.g. v1.0.2'
        required: true
        type: string
      release_draft:
        description: 'Create or use a draft release'
        required: true
        default: false
        type: boolean

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_DRAFT: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' && inputs.release_draft }}

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: ''
            
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install frontend dependencies
        run: bun install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: VoidDrop ${{ env.RELEASE_TAG }}
          releaseBody: See CHANGELOG.md for details.
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: false
          args: ${{ matrix.args }}
